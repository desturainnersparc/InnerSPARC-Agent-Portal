<section class="oqp-panel w-full max-w-2xl mx-auto px-6 text-gray-900 leading-7" data-quiz-fallback="root" aria-live="polite">
  <div class="oqp-slide is-visible" data-quiz-fallback="slide">
    <h3 class="oqp-question mt-4 text-xl font-medium leading-7 mb-4" data-quiz-fallback="prompt"></h3>
    <div class="oqp-choices space-y-4" role="radiogroup" aria-label="Quiz answers" data-quiz-fallback="choices"></div>
    <p class="oqp-result leading-6" role="status" aria-live="polite" data-quiz-fallback="result" hidden></p>
  </div>

  <footer class="tpl1-foot"><span class="tpl1-note">Question X of Y</span><div class="tpl1-controls"><button class="tpl1-btn" id="quizPrev" type="button">Previous</button><button class="tpl1-btn primary" id="quizNext" type="button" disabled>Next</button></div></footer>
</section>
