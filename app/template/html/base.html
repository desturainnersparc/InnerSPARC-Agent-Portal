{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Inner SPARC {% endblock %}</title>

    <link rel="icon" type="image/png" href="{% static 'images/innersparc.png' %}" />
    <link rel="shortcut icon" type="image/png" href="{% static 'images/innersparc.png' %}" />
    <link rel="apple-touch-icon" href="{% static 'images/innersparc.png' %}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/portal.css' %}?v=20260324-25" />
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <script type="module" src="{% static 'js/firebase-init.js' %}"></script>
    <script src="{% static 'js/portal.js' %}?v=2"></script>
</body>
</html>
